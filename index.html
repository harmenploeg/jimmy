<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Amsterdam Locaties</title>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://tile.openstreetmap.org">
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQfuo2x6bgnC+y8ClnZL4EQPLxQm7Ig="
      crossorigin=""
    >
    <link rel="stylesheet" href="styles.css?v=25.1">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Locatieoverzicht">
        <div class="brand-block">
          <p class="eyebrow">Amsterdam</p>
          <h1>Locaties</h1>
          <p id="statusText" class="status-text">Locaties laden uit Google Sheets...</p>
        </div>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="Zoek locatie" aria-label="Zoek locatie">
        </div>
        <ol id="locationList" class="location-list"></ol>
      </aside>

      <section class="map-region" aria-label="Kaart met locaties">
        <div id="map"></div>
        <button id="locateButton" class="locate-button" type="button" aria-label="Centreer kaart op mijn huidige locatie" title="Mijn locatie">
          <span aria-hidden="true">&#8982;</span>
        </button>
      </section>
    </main>

    <div id="detailModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="icon-button close-button" type="button" data-close-modal aria-label="Sluiten">
          <span aria-hidden="true">&times;</span>
        </button>
        <div class="carousel">
          <button id="prevImage" class="carousel-button prev" type="button" aria-label="Vorige afbeelding">
            <span aria-hidden="true">&#8249;</span>
          </button>
          <figure class="carousel-figure">
            <img id="modalImage" alt="">
            <figcaption id="modalCaption"></figcaption>
          </figure>
          <button id="nextImage" class="carousel-button next" type="button" aria-label="Volgende afbeelding">
            <span aria-hidden="true">&#8250;</span>
          </button>
        </div>
        <div class="modal-content">
          <p id="modalCount" class="image-count"></p>
          <h2 id="modalTitle"></h2>
          <p id="modalDescription"></p>
        </div>
      </article>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js?v=25.1"></script>
  </body>
</html>
